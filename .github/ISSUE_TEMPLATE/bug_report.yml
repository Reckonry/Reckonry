name: Bug report
description: Report a reproducible problem in Reckonry.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Reckonry issue. Do not include private financial data, real exchange exports, account identifiers, or unredacted logs.
  - type: input
    id: reckonry-version
    attributes:
      label: Reckonry version
      description: Version, commit SHA, or branch used.
      placeholder: "v0.1.0-alpha, main@abc1234"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.5, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: input
    id: dotnet-version
    attributes:
      label: .NET version
      placeholder: "Output of dotnet --version"
    validations:
      required: true
  - type: textarea
    id: command-used
    attributes:
      label: Command used
      description: Paste the exact command or API call that reproduced the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should Reckonry have done?
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: sanitized-logs
    attributes:
      label: Sanitized logs
      description: Remove all private financial data, account identifiers, source file contents, and personal information before pasting.
      render: text
    validations:
      required: false
  - type: checkboxes
    id: privacy-confirmation
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm this issue does not include private financial data, real exchange exports, account identifiers, or unredacted logs.
          required: true
