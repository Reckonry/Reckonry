name: Feature request
description: Propose a Reckonry enhancement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this template for product, workflow, SDK, reporting, or developer-experience improvements. Do not include private financial data.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should Reckonry solve?
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, workflow, or documentation change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered?
    validations:
      required: false
  - type: dropdown
    id: affected-modules
    attributes:
      label: Affected modules
      description: Select all areas likely affected.
      multiple: true
      options:
        - Core ledger
        - CLI
        - API
        - Importers
        - Reports
        - Reconciliation
        - Tax modules
        - Plugin SDK
        - Documentation
        - Build or release infrastructure
    validations:
      required: true
  - type: checkboxes
    id: privacy-confirmation
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm this request does not include private financial data, real exchange exports, account identifiers, or unredacted logs.
          required: true
